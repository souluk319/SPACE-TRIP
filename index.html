<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>우주여행 — 지구에서 우주의 끝까지</title>
    <meta
      name="description"
      content="지구에서 출발해 관측 가능한 우주의 끝까지, 스케일의 여정. 실사 텍스처와 시네마틱 연출로 떠나는 우주 다큐멘터리."
    />
  </head>
  <body>
    <canvas id="space"></canvas>
    <div id="vignette"></div>

    <!-- 인라인 아이콘 심볼 -->
    <svg width="0" height="0" style="position: absolute" aria-hidden="true">
      <symbol id="ic-plus" viewBox="0 0 24 24">
        <path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
      </symbol>
      <symbol id="ic-minus" viewBox="0 0 24 24">
        <path d="M5 12h14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
      </symbol>
      <symbol id="ic-home" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="7" fill="none" stroke="currentColor" stroke-width="1.5" />
        <ellipse cx="12" cy="12" rx="3" ry="7" fill="none" stroke="currentColor" stroke-width="1.2" />
        <path d="M5.2 9.6h13.6M5.2 14.4h13.6" fill="none" stroke="currentColor" stroke-width="1.2" />
      </symbol>
      <symbol id="ic-audio-on" viewBox="0 0 24 24">
        <path d="M4 9.5v5h3.2L12 18V6L7.2 9.5H4Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
        <path d="M15.5 9a4 4 0 0 1 0 6M17.8 7a7 7 0 0 1 0 10" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
      </symbol>
      <symbol id="ic-audio-off" viewBox="0 0 24 24">
        <path d="M4 9.5v5h3.2L12 18V6L7.2 9.5H4Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
        <path d="M16 9.5l5 5M21 9.5l-5 5" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
      </symbol>
      <symbol id="ic-settings" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.5" />
        <path d="M12 3v2.2M12 18.8V21M21 12h-2.2M5.2 12H3M18.4 5.6l-1.6 1.6M7.2 16.8l-1.6 1.6M18.4 18.4l-1.6-1.6M7.2 7.2 5.6 5.6" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
      </symbol>
      <symbol id="ic-close" viewBox="0 0 24 24">
        <path d="M6 6l12 12M18 6 6 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
      </symbol>
      <symbol id="ic-prev" viewBox="0 0 24 24">
        <path d="M14.5 6 8.5 12l6 6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="ic-next" viewBox="0 0 24 24">
        <path d="M9.5 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
      </symbol>
      <symbol id="ic-play" viewBox="0 0 24 24">
        <path d="M8 5.5v13l11-6.5z" fill="currentColor" />
      </symbol>
      <symbol id="ic-pause" viewBox="0 0 24 24">
        <path d="M8.5 5.5v13M15.5 5.5v13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </symbol>
      <symbol id="ic-dest" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="1.4" />
        <circle cx="12" cy="12" r="2.2" fill="currentColor" />
        <path d="M12 2.5v2.5M12 19v2.5M2.5 12H5M19 12h2.5" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
      </symbol>
    </svg>

    <!-- 좌상단: 스케일 + 챕터 타임라인 -->
    <div id="hud-top">
      <div id="scale-label">—</div>
      <div id="timeline" aria-label="여정 타임라인">
        <div id="timeline-track"></div>
        <div id="timeline-fill"></div>
        <div id="timeline-marker"></div>
      </div>
    </div>

    <!-- 우측 컨트롤 -->
    <div id="side-controls">
      <button id="dest-btn" aria-label="목적지 선택"><svg><use href="#ic-dest" /></svg></button>
      <button id="zoom-in" aria-label="확대"><svg><use href="#ic-plus" /></svg></button>
      <button id="zoom-out" aria-label="축소"><svg><use href="#ic-minus" /></svg></button>
      <button id="home-btn" aria-label="지구로 돌아가기"><svg><use href="#ic-home" /></svg></button>
      <button id="mute-btn" aria-label="소리 끄기" aria-pressed="false"><svg><use href="#ic-audio-on" /></svg></button>
      <button id="settings-btn" aria-label="설정"><svg><use href="#ic-settings" /></svg></button>
    </div>

    <!-- 하단 좌측: lower-third 내레이션 -->
    <div id="lowerthird">
      <div id="lt-chapter"></div>
      <div id="lt-caption"></div>
    </div>

    <!-- 하단 중앙: 챕터 내비게이션 -->
    <div id="tour-nav">
      <button id="nav-prev" aria-label="이전 천체"><svg><use href="#ic-prev" /></svg></button>
      <button id="nav-play" aria-label="일시정지 / 재생"><svg><use href="#ic-pause" /></svg></button>
      <button id="nav-next" aria-label="다음 천체"><svg><use href="#ic-next" /></svg></button>
      <div id="nav-chapter"><span id="nav-idx">1</span> / <span id="nav-total">17</span></div>
    </div>

    <!-- 일시정지 시: 계속 듣기 -->
    <button id="resume-pill"><svg><use href="#ic-play" /></svg> 여정 계속</button>

    <!-- 목적지 선택 패널 -->
    <div id="dest-overlay" class="hidden">
      <div id="dest-card">
        <div id="dest-head">
          <h2>목적지</h2>
          <button id="dest-close" aria-label="닫기"><svg><use href="#ic-close" /></svg></button>
        </div>
        <div id="dest-list"></div>
      </div>
    </div>

    <!-- 시작 오버레이 -->
    <div id="start-overlay">
      <div id="title-block">
        <div id="eyebrow">A JOURNEY THROUGH SCALE</div>
        <h1 id="title">우주여행</h1>
        <p id="subtitle">지구에서 관측 가능한 우주의 끝까지</p>
      </div>
      <button id="start-btn">여행 시작</button>
      <div id="credit">텍스처 · Solar System Scope (CC BY 4.0)</div>
    </div>

    <!-- 엔드 타이틀 -->
    <div id="end-overlay" class="hidden">
      <h2 id="end-title">여정의 끝</h2>
      <p id="end-text">
        930억 광년의 우주, 그 어딘가의 작고 푸른 점에서<br />우리의 여행은 시작되었습니다.
      </p>
      <button id="restart-btn">다시 여행하기</button>
    </div>

    <!-- 설정 -->
    <div id="settings-overlay" class="hidden">
      <div id="settings-card">
        <div id="settings-head">
          <h2>설정</h2>
          <button id="settings-close" aria-label="닫기"><svg><use href="#ic-close" /></svg></button>
        </div>
        <div class="set-section">
          <div class="set-label">내레이터 음성</div>
          <div id="voice-grid"></div>
        </div>
        <div class="set-section">
          <label class="set-toggle"><span>음성 해설</span><input type="checkbox" id="set-voice" checked /></label>
          <label class="set-toggle"><span>배경 음악</span><input type="checkbox" id="set-music" checked /></label>
          <label class="set-toggle"><span>효과음</span><input type="checkbox" id="set-sfx" checked /></label>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
