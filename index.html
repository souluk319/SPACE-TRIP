<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>우주여행 — 토리와 함께 지구에서 은하까지</title>
    <meta
      name="description"
      content="초등 어린이를 위한 가이드 우주여행. 안내원 토리와 함께 지구에서 은하까지 5분 동안 미션을 풀며 우주의 스케일을 배워요."
    />
  </head>
  <body>
    <canvas id="space"></canvas>
    <div id="vignette"></div>

    <div id="scale-panel">
      <div id="scale-label">화면 폭: -</div>
      <div id="gauge">
        <div id="gauge-track"></div>
        <div id="gauge-marker"></div>
      </div>
    </div>

    <div id="side-controls">
      <button id="zoom-in" aria-label="확대">+</button>
      <button id="zoom-out" aria-label="축소">−</button>
      <button id="voice-toggle" aria-label="음성 안내 켜기/끄기" aria-pressed="true">🔊</button>
      <button id="home-btn" aria-label="지구로 돌아가기">🌍</button>
      <button id="settings-btn" aria-label="설정">⚙️</button>
    </div>

    <div id="settings-overlay" class="hidden">
      <div id="settings-card">
        <div id="settings-head">
          <h2>설정</h2>
          <button id="settings-close" aria-label="닫기">✕</button>
        </div>

        <div class="set-section">
          <div class="set-label">토리 목소리</div>
          <div id="voice-grid"></div>
          <div class="set-hint">목소리를 누르면 미리 들어볼 수 있어요</div>
        </div>

        <div class="set-section">
          <label class="set-toggle">
            <span>음성 안내</span>
            <input type="checkbox" id="set-voice" checked />
          </label>
          <label class="set-toggle">
            <span>효과음</span>
            <input type="checkbox" id="set-sfx" checked />
          </label>
        </div>
      </div>
    </div>

    <div id="bottom">
      <div id="journey-progress" aria-label="여정 진행도"></div>
      <div id="guide-panel">
        <div id="guide-avatar">🧑‍🚀</div>
        <div id="guide-content">
          <div id="guide-name">우주 안내원 토리</div>
          <div id="guide-text"></div>
          <div id="mission-row" hidden>🚀 <span id="mission-text"></span></div>
          <div id="quiz-box" hidden>
            <div id="quiz-q"></div>
            <div id="quiz-choices"></div>
            <div id="quiz-explain" hidden></div>
            <div id="quiz-remember" hidden></div>
          </div>
          <button id="journey-next" hidden>다음으로</button>
        </div>
      </div>
      <div id="caption-card">
        <div id="caption-title"></div>
        <div id="caption-text"></div>
      </div>
      <nav id="chips" aria-label="구간 이동"></nav>
    </div>

    <div id="badge-toast" aria-live="polite"></div>

    <div id="complete-overlay" class="hidden">
      <h2>오늘의 우주여행 완료 🎉</h2>
      <p>오늘 얻은 우주 배지</p>
      <ul id="learned-list"></ul>
      <div id="complete-actions">
        <button id="restart-btn">다시 여행하기</button>
        <button id="explore-btn">자유롭게 탐험하기</button>
      </div>
    </div>

    <div id="start-overlay">
      <div id="invite-wordmark">우주여행</div>
      <div id="invite-bubble">
        <span id="invite-text"></span>
        <span id="invite-hint">탭해서 계속 ▸</span>
      </div>
      <div id="invite-tori"></div>
      <button id="start-btn">출발하기</button>
      <small>지구에서 은하까지 5분 여행</small>
      <small class="credit-line">행성 텍스처: Solar System Scope (CC BY 4.0)</small>
    </div>

    <div id="credit">
      텍스처:
      <a href="https://www.solarsystemscope.com/textures/" target="_blank" rel="noopener"
        >Solar System Scope</a
      >
      (CC BY 4.0)
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
